<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生命の夜 — A Night of Life</title>
<meta name="description" content="遺伝的アルゴリズムで進化し続ける光の壁紙。時刻とともに色彩が移ろい、種族が世代交代し、ときおり突然変異がひときわ輝いて生まれる、無常の箱庭。">
<meta name="theme-color" content="#04040a">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='4.5' fill='%23ffe2a0'/><circle cx='16' cy='16' r='10' fill='none' stroke='%23ffe2a0' stroke-opacity='.35' stroke-width='1.5'/></svg>">
<!-- OGP / X(Twitter)共有用。プレビュー画像が無い間は画像なしの summary カードで
     きれいに見せる。preview.png を用意したら og:image / twitter:image を足し、
     twitter:card を summary_large_image に戻す(壊れた画像カードを出さないため) -->
<meta property="og:type" content="website">
<meta property="og:title" content="生命の夜 — A Night of Life">
<meta property="og:description" content="進化し続ける光の壁紙。眺めるたびに違う、無常の箱庭。">
<meta property="og:url" content="https://hello-amedev.github.io/ART/night-of-life/">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="生命の夜 — A Night of Life">
<meta name="twitter:description" content="進化し続ける光の壁紙。眺めるたびに違う、無常の箱庭。">
<style>
  :root {
    /* タスクバーに隠れないよう持ち上げる量。Lively 起動時は
       LivelyProperties.json の bottomMargin が livelyPropertyListener 経由で入る */
    --bottom-offset: 0px;
  }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #04040a;
  }
  canvas {
    display: block;
    position: fixed;
    inset: 0;
  }
  #debug {
    position: fixed;
    left: 12px;
    bottom: calc(10px + var(--bottom-offset));
    color: rgba(255, 255, 255, 0.6);
    font: 12px/1.6 Consolas, monospace;
    pointer-events: none;
    white-space: pre;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
    background: rgba(0, 0, 0, 0.45);
    padding: 6px 9px;
    border-radius: 4px;
  }
  /* 右下の常設観測台帳(OBSERVATORIUM)。
     装飾でなく計器として読ませる: 等幅・角無し・transition 無し・背景パネル無し
     (透明 + 影のみ = 観察者が画面に直接書き込んだ記録の質感)。
     数値とブロック文字で語り、滑らかなアニメーションは持たない */
  #hud {
    position: fixed;
    right: 16px;
    bottom: calc(14px + var(--bottom-offset));
    text-align: left;
    color: rgba(255, 255, 255, 0.46);
    font: 11px/16px Consolas, 'Courier New', monospace;
    letter-spacing: 0.06em;
    pointer-events: none;
    user-select: none;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.85);
  }
  /* 各部の高さを固定し、種族数や事象数が変わっても台帳が上下しないようにする */
  #hud .meta {
    height: 16px;
    color: rgba(255, 255, 255, 0.55);
    margin-bottom: 5px;
  }
  /* 種族行は最大 6(常時 5 + 退場中 1)ぶんの高さを必ず確保 = 行の増減で動かない */
  #hud .rows {
    display: flex;
    flex-direction: column;
    min-height: 96px;
  }
  #hud .row {
    display: flex;
    align-items: center;
    gap: 9px;
    height: 16px;
    justify-content: flex-start;
    white-space: nowrap;
  }
  /* 色チップ = 種族の identity。常に純色・角無し・transition 無し */
  #hud .chip {
    width: 8px;
    height: 8px;
    flex: none;
  }
  /* 世代(今の種族)。掛け合わせ親とは別の列にして見分けやすく */
  #hud .gen {
    min-width: 30px;
    text-align: right;
  }
  /* 掛け合わせ親(系譜)。現世代と分けて、控えめな色で */
  #hud .from {
    min-width: 50px;
    text-align: left;
    color: rgba(255, 255, 255, 0.34);
  }
  /* 機械的な数値列: 素の数字を右寄せで等幅整列(デバッグ表示と同じ羅列の質感)。
     自作のバー・グリフは使わない。spd=速さ flk=群れ len=筆の長さ(いずれも 0..1) */
  #hud .act,
  #hud .vig,
  #hud .spd,
  #hud .flk,
  #hud .len {
    min-width: 32px;
    text-align: right;
    color: rgba(255, 255, 255, 0.62);
  }
  #hud .age { min-width: 44px; text-align: right; }
  #hud .state {
    min-width: 38px;
    text-align: left;
    color: rgba(255, 255, 255, 0.55);
  }
  /* 列見出し(一度だけ薄く)。数値列の上にラベルを置いて表として読ませる */
  #hud .head {
    display: flex;
    align-items: center;
    gap: 9px;
    height: 16px;
  }
  /* 見出しは列の色に関わらず一律で薄く */
  #hud .head span {
    color: rgba(255, 255, 255, 0.3);
  }
  /* 突然変異の印(✦)を灯している間だけ、状態表示が金色になる */
  #hud .state.nova {
    color: rgba(255, 226, 160, 0.92);
  }
  /* 事象ログ(誕生 ↑ / 退場 ↓ / 突然変異 ✦ / 参入 +)。観察者の手帳。
     常に 3 行ぶんを確保し、上の罫線も固定位置 = ここも上下しない */
  #hud .log {
    margin-top: 5px;
    padding-top: 5px;
    border-top: 1px solid rgba(255, 255, 255, 0.12);
    color: rgba(255, 255, 255, 0.32);
  }
  #hud .ev {
    height: 16px;
    white-space: nowrap;
  }
  #hud .ev .evt {
    color: rgba(255, 255, 255, 0.24);
  }
  #hud .ev.nova {
    color: rgba(255, 226, 160, 0.7);
  }
  /* スマホなど幅の狭い画面では観測台帳が画面からはみ出さないよう縮小する。
     右下を基準に縮めるので位置はそのまま。視認性より「画面に収まること」を優先
     (あめさん方針: 文字は小さくて良い) */
  @media (max-width: 760px) {
    #hud { transform: scale(0.62); transform-origin: bottom right; }
  }
  @media (max-width: 420px) {
    #hud { transform: scale(0.5); transform-origin: bottom right; }
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="debug" hidden></div>
<div id="hud" hidden>
  <div class="meta"></div>
  <div class="head">
    <span class="chip"></span>
    <span class="gen">gen</span>
    <span class="from">from</span>
    <span class="act">act</span>
    <span class="vig">vig</span>
    <span class="spd">spd</span>
    <span class="flk">flk</span>
    <span class="len">len</span>
    <span class="age">age</span>
    <span class="state"></span>
  </div>
  <div class="rows"></div>
  <div class="log"></div>
</div>
<script src="js/noise.js"></script>
<script src="js/genome.js"></script>
<script src="js/field.js"></script>
<script src="js/species.js"></script>
<script src="js/evolution.js"></script>
<script src="js/lively.js"></script>
<script src="js/main.js"></script>
<script src="js/webui.js"></script>
</body>
</html>
